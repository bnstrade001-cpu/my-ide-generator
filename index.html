<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN CORPORATION - ID Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            margin: 0;
        }
        h1 { 
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .container {
            display: flex;
            flex-direction: row;
            gap: 50px;
            background: #141414;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            align-items: center;
        }

        .card-wrapper {
            width: 369px;  
            height: 625.5px; 
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* 820x1390 원본 해상도 유지 보드 */
        #id-card {
            position: absolute;
            width: 820px;
            height: 1390px;
            background-color: #1a1a1a;
            transform: scale(0.45);
            transform-origin: top left;
        }

        /* 🛠️ [핵심 변경] 사원증 배경틀을 가장 위로 올림 (z-index: 3) */
        /* 마우스 클릭이나 드래그가 뒤의 사진에 전달되도록 pointer-events: none 설정 */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); /* 가운데 칸이 투명한 PNG 규격 필수 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 3;
            pointer-events: none; 
        }

        /* 🛠️ [핵심 변경] 사진 구역을 배경 뒤쪽으로 배치 (z-index: 1) */
        /* 투명하게 뚫린 구멍 뒤에서 마음껏 움직여도 로고를 가리지 못함 */
        .photo-area {
            position: absolute;
            top: 315px;       
            left: 191px;      
            width: 438px;     
            height: 555px;    
            background-color: #000000;
            overflow: hidden;
            z-index: 1;
            cursor: move;
            user-select: none;
        }

        .photo-area img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform-origin: center center;
            transition: transform 0.02s ease-out;
        }

        /* 🛠️ [핵심 변경] 텍스트 영역도 배경 위로 올림 (z-index: 4) */
        .info-area {
            position: absolute;
            top: 935px;       
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
            z-index: 4;
        }

        .info-name {
            font-size: 44px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        .info-rank {
            font-size: 22px;
            color: #b0b0b0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .info-sub {
            font-size: 15px;
            color: #444444;
            letter-spacing: 1px;
        }

        /* 입력 폼 및 컨트롤러 UI */
        .input-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 13px;
            color: #888;
            font-weight: bold;
        }
        input {
            padding: 12px;
            font-size: 15px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
        }
        .scale-slider {
            -webkit-appearance: none;
            width: 100%;
            background: #333;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        .scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }
        button {
            margin-top: 10px;
            padding: 16px;
            font-size: 16px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #cccccc; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h1>OBSIDIAN CORPORATION</h1>
    <div class="subtitle">IDENTITY CARD REAL-TIME EDITOR</div>

    <div class="container">
        <div class="card-wrapper">
            <div id="id-card">
                <div class="photo-area" id="photo-container">
                    <span id="placeholder-text" style="color:#444; font-size:18px; letter-spacing:1px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">INSERT PORTRAIT</span>
                </div>
                
                <div class="card-bg"></div>

                <div class="info-area">
                    <div class="info-name" id="card-name">정 우 진</div>
                    <div class="info-rank" id="card-rank">LOGISTICS TEAM LEADER</div>
                    <div class="info-sub" id="card-sub">ID: 251013-001  /  DEPT: LOGISTICS SYSTEM</div>
                </div>
            </div>
        </div>

        <div class="input-form">
            <div class="input-group">
                <label>1. PORTRAIT (증명사진 업로드)</label>
                <input type="file" id="image-input" accept="image/*">
            </div>

            <div class="input-group">
                <label>🔍 PORTRAIT SCALE (사진 크기 조절)</label>
                <input type="range" id="scale-input" class="scale-slider" min="0.3" max="3" step="0.01" value="1" disabled>
            </div>
            
            <div class="input-group">
                <label>2. FULL NAME (이름)</label>
                <input type="text" id="name-input" value="정 우 진">
            </div>
            
            <div class="input-group">
                <label>3. TITLE / POSITION (직급)</label>
                <input type="text" id="rank-input" value="LOGISTICS TEAM LEADER">
            </div>

            <div class="input-group">
                <label>4. EMPLOYEE DETAILS (사번 및 부서 상세 정보)</label>
                <input type="text" id="sub-input" value="ID: 251013-001  /
