<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN CORPORATION - ID Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            margin: 0;
        }
        h1 { 
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .container {
            display: flex;
            flex-direction: row;
            gap: 50px;
            background: #141414;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            align-items: center;
        }

        .card-wrapper {
            width: 369px;  
            height: 625.5px; 
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #id-card {
            position: absolute;
            width: 820px;
            height: 1390px;
            background-color: #1a1a1a;
            transform: scale(0.45);
            transform-origin: top left;
        }

        /* 1. 사원증 투명 PNG 프레임 (가장 위 레이어) */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 3;
            pointer-events: none; 
        }

        /* 2. 사진이 맴도는 구역 (가장 아래 레이어) */
        .photo-area {
            position: absolute;
            top: 300px;       
            left: 170px;      
            width: 480px;     
            height: 580px;    
            background-color: transparent; 
            overflow: hidden;
            z-index: 1;
            cursor: move;
            user-select: none;
        }

        .photo-area img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform-origin: center center;
            transition: transform 0.02s ease-out;
        }

        /* 3. 텍스트 영역 (레이어 맨 위) */
        .info-area {
            position: absolute;
            top: 935px;       
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
            z-index: 4;
            transition: all 0.2s ease;
        }

        .info-name {
            font-size: 44px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        .info-rank {
            font-size: 22px;
            color: #b0b0b0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .info-sub {
            font-size: 15px;
            color: #444444;
            letter-spacing: 1px;
        }

        /* TYPE 2 실시간 화면 렌더링용 강제 규칙 */
        #id-card.type-2 .info-rank {
            display: none !important;
        }
        #id-card.type-2 .info-area {
            top: 955px; 
            gap: 15px;
        }

        /* 컨트롤러 UI */
        .input-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 13px;
            color: #888;
            font-weight: bold;
        }
        select, input {
            padding: 12px;
            font-size: 15px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            outline: none;
        }
        select:focus, input:focus {
            border-color: #666;
        }
        .scale-slider {
            -webkit-appearance: none;
            width: 100%;
            background: #333;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        .scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }
        button {
            margin-top: 10px;
            padding: 16px;
            font-size: 16px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #cccccc; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h1>OBSIDIAN CORPORATION</h1>
    <div class="subtitle">IDENTITY CARD REAL-TIME EDITOR</div>

    <div class="container">
        <div class="card-wrapper">
            <div id="id-card">
                <div class="photo-area" id="photo-container">
                    <span id="placeholder-text" style="color:#444; font-size:18px; letter-spacing:1px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">INSERT PORTRAIT</span>
                </div>
                
                <div class="card-bg" id="card-frame"></div>

                <div class="info-area" id="info-box">
                    <div class="info-name" id="card-name">정 우 진</div>
                    <div class="info-rank" id="card-rank">LOGISTICS TEAM LEADER</div>
                    <div class="info-sub" id="card-sub">ID: 251013-001  /  DEPT: LOGISTICS SYSTEM</div>
                </div>
            </div>
        </div>

        <div class="input-form">
            <div class="input-group">
                <label>💳 SELECT ID CARD DESIGN (디자인 선택)</label>
                <select id="card-type-select">
                    <option value="type-1">TYPE 1 (사원 - bg.png)</option>
                    <option value="type-2">TYPE 2 (크리처 - bg2.png)</option>
                </select>
            </div>

            <div class="input-group">
                <label>1. PORTRAIT (증명사진 업로드)</label>
                <input type="file" id="image-input" accept="image/*">
            </div>

            <div class="input-group">
                <label>🔍 PORTRAIT SCALE (사진 크기 조절)</label>
                <input type="range" id="scale-input" class="scale-slider" min="0.3" max="3" step="0.01" value="1" disabled>
            </div>
            
            <div class="input-group">
                <label>2. FULL NAME (이름)</label>
                <input type="text" id="name-input" value="정 우 진">
            </div>
            
            <div class="input-group" id="input-group-rank">
                <label>3. TITLE / POSITION (직급)</label>
                <input type="text" id="rank-input" value="LOGISTICS TEAM LEADER">
            </div>

            <div class="input-group">
                <label>4. EMPLOYEE DETAILS (사번 및 부서 상세 정보)</label>
                <input type="text" id="sub-input" value="ID: 251013-001  /  DEPT: LOGISTICS SYSTEM">
            </div>
            
            <button onclick="downloadCard()">GENERATE & DOWNLOAD</button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const scaleInput = document.getElementById('scale-input');
        const container = document.getElementById('photo-container');
        const idCard = document.getElementById('id-card');
        const cardFrame = document.getElementById('card-frame');
        const cardTypeSelect = document.getElementById('card-type-select');
        const inputGroupRank = document.getElementById('input-group-rank');
        const placeholder = document.getElementById('placeholder-text');
        
        let imgElement = null;
        let isDragging = false;
        let startX, startY;
        let currentX = 0, currentY = 0;
        let imgScale = 1;

        // 화면 실시간 스위칭 처리
        cardTypeSelect.addEventListener('change', function(e) {
            const selectedType = e.target.value;
            if (selectedType === 'type-2') {
                cardFrame.style.backgroundImage = "url('bg2.png')";
                idCard.classList.add('type-2');
                inputGroupRank.style.display = 'none'; 
            } else {
                cardFrame.style.backgroundImage = "url('bg.png')";
                idCard.classList.remove('type-2');
                inputGroupRank.style.display = 'flex';  
            }
        });

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    if(placeholder) placeholder.style.display = 'none';
                    if(imgElement) imgElement.remove();
                    
                    imgElement = document.createElement('img');
                    imgElement.src = event.target.result;
                    container.appendChild(imgElement);
                    
                    currentX = 0; currentY = 0; imgScale = 1;
                    scaleInput.value = 1;
                    scaleInput.disabled = false;
                    updateTransform();
                    
                    initDragEvents();
                };
                reader.readAsDataURL(file);
            }
        });

        scaleInput.addEventListener('input', function(e) {
            imgScale = e.target.value;
            updateTransform();
        });

        function updateTransform() {
            if (imgElement) {
                imgElement.style.transform = `translate(${currentX}px, ${currentY}px) scale(${imgScale})`;
            }
        }

        function initDragEvents() {
            container.onmousedown = dragStart;
            container.ontouchstart = dragStart;
        }

        function dragStart(e) {
            if (!imgElement) return;
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX / 0.45 - currentX;
            startY = clientY / 0.45 - currentY;
            document.onmousemove = dragMove;
            document.ontouchmove = dragMove;
            document.onmouseup = dragEnd;
            document.ontouchend = dragEnd;
        }

        function dragMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            currentX = (clientX / 0.45) - startX;
            currentY = (clientY / 0.45) - startY;
            updateTransform();
        }

        function dragEnd() {
            isDragging = false;
            document.onmousemove = null;
            document.ontouchmove = null;
            document.onmouseup = null;
            document.ontouchend = null;
        }

        document.getElementById('name-input').addEventListener('input', function(e) {
            document.getElementById('card-name').innerText = e.target.value;
        });
        document.getElementById('rank-input').addEventListener('input', function(e) {
            document.getElementById('card-rank').innerText = e.target.value;
        });
        document.getElementById('sub-input').addEventListener('input', function(e) {
            document.getElementById('card-sub').innerText = e.target.value;
        });

        // 🛠️ [긴급 초정밀 다운로드 디버깅] html2canvas 엔진 전용 강제 변환 파이프라인
        function downloadCard() {
            const card = document.getElementById('id-card');
            const rankText = document.getElementById('card-rank');
            const infoBox = document.getElementById('info-box');
            const selectedType = cardTypeSelect.value;
            
            // 1. 캡처 전 0.45 배율 제거 (원본 해상도 복구)
            card.style.transform = "none";
            
            // 2. html2canvas의 고질적인 가상 클래스 인식 오류 차단을 위한 하드코딩 주입
            if (selectedType === 'type-2') {
                cardFrame.style.backgroundImage = "url('bg2.png')";
                rankText.style.setProperty('display', 'none', 'important'); // 직급 하드 킬
                infoBox.style.top = "955px"; // 간격 보정 하드코딩
            } else {
                cardFrame.style.backgroundImage = "url('bg.png')";
                rankText.style.setProperty('display', 'block', 'important');
                infoBox.style.top = "935px";
            }
            
            // 3. 렌더링 시동
            html2canvas(card, {
                useCORS: true,
                width: 820,
                height: 1390,
                scale: 1
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = selectedType === 'type-2' ? 'obsidian_id_card_simple.png' : 'obsidian_id_card_basic.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // 4. 다운로드 완료 후 웹 화면용 배율(0.45) 및 가상 스타일 원상 복구
                card.style.transform = "scale(0.45)";
                if (selectedType === 'type-2') {
                    rankText.style.setProperty('display', 'none', 'important');
                    infoBox.style.top = "955px";
                } else {
                    rankText.style.removeAttribute('style');
                    infoBox.style.removeAttribute('style');
                }
            });
        }
    </script>
</body>
</html>
