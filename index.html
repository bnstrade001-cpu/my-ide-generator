<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 사원증 제작소</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #333; }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        /* 사원증 크기 및 디자인 설정 */
        #id-card {
            position: relative;
            width: 350px;
            height: 500px;
            background-image: url('bg.png'); /* 여기에 배경 이미지 파일명 입력 */
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        /* 증명사진이 배치될 위치 */
        .photo-area {
            position: absolute;
            top: 140px; /* 사원증 틀에 맞춰 상단 여백 조절 */
            left: 50%;
            transform: translateX(-50%);
            width: 130px; /* 증명사진 너비 */
            height: 160px; /* 증명사진 높이 */
            border: 1px solid #ddd;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 텍스트(이름, 직급) 배치 위치 */
        .info-area {
            position: absolute;
            bottom: 60px; /* 사원증 틀에 맞춰 하단 여백 조절 */
            width: 100%;
            text-align: center;
            color: #333;
        }
        .info-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .info-rank {
            font-size: 16px;
            color: #666;
        }
        /* 입력창 및 버튼 스타일 */
        .input-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>사원증 만들기</h1>

    <div class="container">
        <div id="id-card">
            <div class="photo-area" id="photo-preview">
                <span style="color:#aaa; font-size:12px;">사진 없음</span>
            </div>
            <div class="info-area">
                <div class="info-name" id="card-name">홍길동</div>
                <div class="info-rank" id="card-rank">팀장</div>
            </div>
        </div>

        <div class="input-form">
            <label>1. 증명사진 업로드:</label>
            <input type="file" id="image-input" accept="image/*">
            
            <label>2. 이름 입력:</label>
            <input type="text" id="name-input" placeholder="이름을 입력하세요" value="홍길동">
            
            <label>3. 직급 입력:</label>
            <input type="text" id="rank-input" placeholder="직급을 입력하세요" value="팀장">
            
            <button onclick="downloadCard()">사원증 다운로드</button>
        </div>
    </div>

    <script>
        // 이미지 미리보기 기능
        document.getElementById('image-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('photo-preview');
                    preview.innerHTML = `<img src="${event.target.result}" alt="증명사진">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 실시간 이름 반영
        document.getElementById('name-input').addEventListener('input', function(e) {
            document.getElementById('card-name').innerText = e.target.value || '이름';
        });

        // 실시간 직급 반영
        document.getElementById('rank-input').addEventListener('input', function(e) {
            document.getElementById('card-rank').innerText = e.target.value || '직급';
        });

        // 카드 이미지 다운로드 기능
        function downloadCard() {
            const card = document.getElementById('id-card');
            html2canvas(card, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'my-id-card.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
