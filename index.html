<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN CORPORATION - ID Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            margin: 0;
        }
        h1 { 
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .container {
            display: flex;
            flex-direction: row;
            gap: 50px;
            background: #141414;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            align-items: center;
        }

        .card-wrapper {
            width: 369px;  
            height: 625.5px; 
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #id-card {
            position: absolute;
            width: 820px;
            height: 1390px;
            background-color: #1a1a1a;
            transform: scale(0.45);
            transform-origin: top left;
        }

        /* 사원증 투명 PNG 프레임 (가장 위 레이어) */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 3;
            pointer-events: none; 
        }

        /* 🛠️ [긴급 수정] 투명창 경계선 안쪽으로 완벽하게 끼워 맞춤 */
        /* 높이를 줄이고 아래쪽 깎인 은색 모서리에 맞게 border-radius와 오차 조절 */
        .photo-area {
            position: absolute;
            top: 318px;       /* 상단 은색 선 위치 일치 */
            left: 194px;      /* 좌측 은색 선 위치 일치 */
            width: 432px;     /* 안쪽 가로 폭 */
            height: 532px;    /* ⭐️ 기존 555px에서 아래쪽 삐져나오던 길이를 532px로 정밀 축소 */
            background-color: #000000;
            overflow: hidden;
            z-index: 1;
            cursor: move;
            user-select: none;
            border-radius: 24px; /* ⭐️ 아래쪽 각진 프레임 라인에 맞춰 모서리 커팅 처리 */
        }

        .photo-area img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform-origin: center center;
            transition: transform 0.02s ease-out;
        }

        /* 텍스트 영역 */
        .info-area {
            position: absolute;
            top: 935px;       
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
            z-index: 4;
        }

        .info-name {
            font-size: 44px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        .info-rank {
            font-size: 22px;
            color: #b0b0b0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .info-sub {
            font-size: 15px;
            color: #444444;
            letter-spacing: 1px;
        }

        /* 컨트롤러 UI */
        .input-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 13px;
            color: #888;
            font-weight: bold;
        }
        input {
            padding: 12px;
            font-size: 15px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
        }
        .scale-slider {
            -webkit-appearance: none;
            width: 100%;
            background: #333;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        .scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }
        button {
            margin-top: 10px;
            padding: 16px;
            font-size: 16px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #cccccc; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h1>OBSIDIAN CORPORATION</h1>
    <div class="subtitle">IDENTITY CARD REAL-TIME EDITOR</div>

    <div class="container">
        <div class="card-wrapper">
            <div id="id-card">
                <div class="photo-area" id="photo-container">
                    <span id="placeholder-text" style="color:#444; font-size:18px; letter-spacing:1px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">INSERT PORTRAIT</span>
                </div>
                
                <div class="card-bg"></div>

                <div class="info-area">
                    <div class="info-name" id="card-name">정 우 진</div>
                    <div class="info-rank" id="card-rank">LOGISTICS TEAM LEADER</div>
                    <div class="info-sub" id="card-sub">ID: 251013-001  /  DEPT: LOGISTICS SYSTEM</div>
                </div>
            </div>
        </div>

        <div class="input-form">
            <div class="input-group">
                <label>1. PORTRAIT (증명사진 업로드)</label>
                <input type="file" id="image-input" accept="image/*">
            </div>

            <div class="input-group">
                <label>🔍 PORTRAIT SCALE (사진 크기 조절)</label>
                <input type="range" id="scale-input" class="scale-slider" min="0.3" max="3" step="0.01" value="1" disabled>
            </div>
            
            <div class="input-group">
                <label>2. FULL NAME (이름)</label>
                <input type="text" id="name-input" value="정 우 진">
            </div>
            
            <div class="input-group">
                <label>3. TITLE / POSITION (직급)</label>
                <input type="text" id="rank-input" value="LOGISTICS TEAM LEADER">
            </div>

            <div class="input-group">
                <label>4. EMPLOYEE DETAILS (사번 및 부서 상세 정보)</label>
                <input type="text" id="sub-input" value="ID: 251013-001  /  DEPT: LOGISTICS SYSTEM">
            </div>
            
            <button onclick="downloadCard()">GENERATE & DOWNLOAD</button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const scaleInput = document.getElementById('scale-input');
        const container = document.getElementById('photo-container');
        const idCard = document.getElementById('id-card');
        const placeholder = document.getElementById('placeholder-text');
        
        let imgElement = null;
        let isDragging = false;
        let startX, startY;
        let currentX = 0, currentY = 0;
        let imgScale = 1;

            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    if(placeholder) placeholder.style.display = 'none';
                    if(imgElement) imgElement.remove();
